services:
  mam-audiofinder:
    build: .
    image: ${MAF_IMAGE:-seanap/maf:latest}
    container_name: mam-audiofinder
    ports:
      - "${APP_PORT:-8008}:8080"
    env_file:
      - path: .env
        required: false
    user: "${PUID:-99}:${PGID:-100}"
    environment:
      UMASK: "${UMASK:-0002}"
    volumes:
      - ${DATA_DIR:-./data}:/data
    restart: unless-stopped
