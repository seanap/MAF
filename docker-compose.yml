services:
  mam-audiofinder:
    build: .
    image: ${MAF_IMAGE:-seanap/maf:latest}
    container_name: mam-audiofinder
    ports:
      - "${APP_PORT:-8008}:8080"
    env_file:
      - path: .env
        required: false
    user: "${PUID:-99}:${PGID:-100}"
    environment:
      UMASK: "${UMASK:-0002}"
    volumes:
      - ${DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
